<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="calculator">
    <header class="calc-header">
      <span class="angle-mode" id="angleMode" title="Click to toggle DEG/RAD">DEG</span>
      <div class="display">
        <div class="expression" id="expression" aria-live="polite"></div>
        <div class="result" id="result" aria-live="polite">0</div>
      </div>
    </header>

    <section class="keypad">
      <div class="row">
        <button type="button" class="btn fn" data-action="clear">C</button>
        <button type="button" class="btn fn" data-action="backspace">⌫</button>
        <button type="button" class="btn fn" data-action="percent">%</button>
        <button type="button" class="btn op" data-action="divide">÷</button>
      </div>
      <div class="row">
        <button type="button" class="btn fn" data-action="sin">sin</button>
        <button type="button" class="btn num" data-action="7">7</button>
        <button type="button" class="btn num" data-action="8">8</button>
        <button type="button" class="btn num" data-action="9">9</button>
        <button type="button" class="btn op" data-action="multiply">×</button>
      </div>
      <div class="row">
        <button type="button" class="btn fn" data-action="cos">cos</button>
        <button type="button" class="btn num" data-action="4">4</button>
        <button type="button" class="btn num" data-action="5">5</button>
        <button type="button" class="btn num" data-action="6">6</button>
        <button type="button" class="btn op" data-action="subtract">−</button>
      </div>
      <div class="row">
        <button type="button" class="btn fn" data-action="tan">tan</button>
        <button type="button" class="btn num" data-action="1">1</button>
        <button type="button" class="btn num" data-action="2">2</button>
        <button type="button" class="btn num" data-action="3">3</button>
        <button type="button" class="btn op" data-action="add">+</button>
      </div>
      <div class="row">
        <button type="button" class="btn fn" data-action="ln">ln</button>
        <button type="button" class="btn num" data-action="0">0</button>
        <button type="button" class="btn num" data-action="decimal">.</button>
        <button type="button" class="btn fn" data-action="equals">=</button>
        <button type="button" class="btn op" data-action="power">x<sup>y</sup></button>
      </div>
      <div class="row sci">
        <button type="button" class="btn fn" data-action="log">log</button>
        <button type="button" class="btn fn" data-action="sqrt">√</button>
        <button type="button" class="btn fn" data-action="square">x²</button>
        <button type="button" class="btn fn" data-action="reciprocal">1/x</button>
        <button type="button" class="btn fn" data-action="pi">π</button>
        <button type="button" class="btn fn" data-action="e">e</button>
      </div>
      <div class="row sci">
        <button type="button" class="btn fn" data-action="openParen">(</button>
        <button type="button" class="btn fn" data-action="closeParen">)</button>
        <button type="button" class="btn fn" data-action="factorial">n!</button>
        <button type="button" class="btn fn" data-action="negate">±</button>
      </div>
    </section>
  </main>
  <script src="calculator.js"></script>
</body>
</html>
